<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emerald - Changelog</title>
  <link rel="icon" type="image/svg+xml" href="emerald.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="docs.css">
  <style>
    .release { margin-bottom: 2.5rem; }
    .release h3 {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .75rem;
    }
    .release h3 .tag {
      font-size: .7rem;
      font-weight: 500;
      background: var(--accent-dim);
      color: var(--accent);
      padding: .15rem .5rem;
      border-radius: 4px;
      border: 1px solid rgba(46, 160, 67, .3);
    }
    .release h3 .date {
      font-size: .8rem;
      font-weight: 400;
      color: var(--text2);
    }
    .release .body {
      color: var(--text2);
      font-size: .9rem;
      line-height: 1.7;
    }
    .release .body ul { margin-top: .5rem; }
    .release .body code {
      font-family: var(--font);
      font-size: .85em;
      background: var(--surface);
      padding: .1em .4em;
      border-radius: 3px;
    }
    .release .body a {
      color: var(--accent);
      text-decoration: none;
    }
    .release .body a:hover {
      text-decoration: underline;
    }
    .loading, .error {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text2);
    }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="index.html"><img src="emerald.svg" alt="" class="logo-icon"> emerald</a></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="docs.html">Docs</a>
      <a href="examples.html">Examples</a>
      <a href="changelog.html">Changelog</a>
      <a href="https://github.com/hannogeo/Emerald" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>
  </header>

  <main class="docs-page">
    <a href="index.html" class="back-link">&larr; Back to Home</a>
    <h1>Changelog</h1>
    <p>Release history for Emerald.</p>
    <div id="releases"></div>
  </main>

  <footer>
    <p>Emerald - built with Go</p>
    <p class="small"><a href="https://github.com/hannogeo/Emerald" target="_blank" rel="noopener noreferrer">GitHub</a></p>
  </footer>

  <script>
    (function() {
      var container = document.getElementById('releases');
      container.innerHTML = '<p class="loading">Loading releases...</p>';

      fetch('https://api.github.com/repos/hannogeo/Emerald/releases?per_page=20')
        .then(function(r) { if (!r.ok) throw new Error('Failed to fetch'); return r.json(); })
        .then(function(data) {
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="loading">No releases yet.</p>';
            return;
          }
          var html = '';
          data.forEach(function(r) {
            var date = r.published_at ? r.published_at.slice(0, 10) : '';
            var body = (r.body || '')
              .replace(/### (.+)/g, '<strong>$1</strong>')
              .replace(/\*\*(.+?)\*\*: (https?:\/\/\S+)/g, '<strong>$1</strong>: <a href="$2" target="_blank" rel="noopener">$2</a>')
              .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
              .replace(/\n/g, '<br>');
            html += '<div class="release">';
            html += '<h3>' + r.name + ' <span class="tag">' + r.tag_name + '</span> <span class="date">' + date + '</span></h3>';
            html += '<div class="body">' + body + '</div>';
            html += '</div>';
          });
          container.innerHTML = html;
        })
        .catch(function() {
          container.innerHTML = '<p class="error">Failed to load releases. <a href="https://github.com/hannogeo/Emerald/releases" style="color:var(--accent)">View on GitHub</a></p>';
        });
    })();
  </script>
</body>
</html>
