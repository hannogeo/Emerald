name: Release

on:
  push:
    branches: [main]
    paths:
      - 'version.go'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Extract version
        id: version
        run: echo "version=$(grep 'Version = ' version.go | sed 's/.*\"\(.*\)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Build emerald.exe
        run: GOOS=windows GOARCH=amd64 go build -o emerald.exe .

      - name: Build emerald-installer.exe
        run: GOOS=windows GOARCH=amd64 go build -o emerald-installer.exe ./installer

      - name: Package VS Code extension
        run: npx @vscode/vsce package && mv emerald-lang-*.vsix ../emerald-lang.vsix
        working-directory: vscode-emerald

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            emerald.exe
            emerald-installer.exe
            emerald-lang.vsix
